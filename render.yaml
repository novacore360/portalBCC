services:
  - type: web
    name: bcc-portal
    env: node
    buildCommand: npm run install-all && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_FROM_NAME
        value: BCC Portal
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
